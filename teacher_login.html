{% extends 'base.html' %}
{% load static %}

{% block content %}
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>

<div class="login-container">
    <div class="login-box">

        <h2>Teacher Login</h2>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <input type="text" 
                   name="empid" 
                   placeholder="Emp ID" 
                   value="{{ request.POST.empid }}"
                   required>
            
            <input type="password" 
                   name="password" 
                   placeholder="Password" 
                   required>

            <button type="submit">Login</button>
        </form>

        <p class="register-text">
            No account?
            <a href="/teacher-register">Register</a>
        </p>

    </div>
</div>

{% endblock %}
